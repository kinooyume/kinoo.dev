name: Release & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [articles-updated]

permissions:
  contents: write

jobs:
  release:
    name: Release (bump, build, changelog, deploy)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ssh-key: ${{ secrets.ARTICLES_DEPLOY_KEY }}

      - name: Use GITHUB_TOKEN for pushing to kinoo.dev
        run: git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git

      - name: Bump version and generate changelog
        id: bump
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Push bump commit and tag
        if: steps.bump.outputs.version != ''
        run: |
          git push origin main --follow-tags
          git fetch origin develop
          git checkout -B develop origin/develop
          git merge main --no-edit
          git push origin develop

      - uses: oven-sh/setup-bun@v2
        if: steps.bump.outputs.version != ''
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.bump.outputs.version != ''
        run: bun install

      - name: Build
        if: steps.bump.outputs.version != ''
        run: bun run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}

      - name: Extract changelog for release
        if: steps.bump.outputs.version != ''
        id: changelog
        run: cog changelog --at ${{ steps.bump.outputs.version }} > /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: Release ${{ steps.bump.outputs.version }}
          body_path: /tmp/release_notes.md
          make_latest: true

      - name: Deploy to Netlify
        if: steps.bump.outputs.version != ''
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  deploy-articles:
    name: Deploy (articles update)
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          ssh-key: ${{ secrets.ARTICLES_DEPLOY_KEY }}

      - name: Update articles submodule
        run: git submodule update --remote src/content/articles

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
