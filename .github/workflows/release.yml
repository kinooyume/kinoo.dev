name: Release & Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [articles-updated]

permissions:
  contents: write

jobs:
  release:
    name: Release (bump, build, changelog, deploy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
          ssh-key: ${{ secrets.ARTICLES_DEPLOY_KEY }}

      - name: Update articles submodule
        if: github.event_name == 'repository_dispatch'
        id: submodule
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git submodule update --remote src/content/articles
          if git diff --quiet src/content/articles; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add src/content/articles
            git commit -m "fix(content): update articles"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if articles already up to date
        if: github.event_name == 'repository_dispatch' && steps.submodule.outputs.changed == 'false'
        run: |
          echo "Submodule already at latest — skipping release"
          exit 1

      - name: Bump version and generate changelog
        id: bump
        uses: cocogitto/cocogitto-action@v4
        with:
          command: bump
          args: --auto
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Push bump commit and tag
        if: steps.bump.outputs.version != ''
        run: |
          git push origin main --follow-tags
          git fetch origin develop
          git checkout -B develop origin/develop
          git merge main --no-edit
          git push origin develop

      - uses: oven-sh/setup-bun@v2
        if: steps.bump.outputs.version != ''
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.bump.outputs.version != ''
        run: bun install

      - name: Build
        if: steps.bump.outputs.version != ''
        run: bun run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.PUBLIC_WEB3FORMS_ACCESS_KEY }}

      - name: Extract changelog for release
        if: steps.bump.outputs.version != ''
        id: changelog
        run: cog changelog --at ${{ steps.bump.outputs.version }} > /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.bump.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: Release ${{ steps.bump.outputs.version }}
          body_path: /tmp/release_notes.md
          make_latest: true

      - name: Deploy to Netlify
        if: steps.bump.outputs.version != ''
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./dist
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
